# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name cloud1ty.duckdns.org;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name cloud1ty.duckdns.org;

    # SSL Configuration (Paths mapped via Docker volumes)
    ssl_certificate /etc/letsencrypt/live/cloud1ty.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud1ty.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html;
    index index.php index.html index.htm;

    # WordPress Routing
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # phpMyAdmin Routing
    location ^~ /phpmyadmin/ {
        proxy_pass http://phpmyadmin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}