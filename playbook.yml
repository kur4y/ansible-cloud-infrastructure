---
- name: Server Initialization and Swap Configuration
  hosts: cloud1
  become: true  # run tasks as root (sudo equivalent)

  tasks:
    # swap
    - name: Check if swap file already exists
      ansible.builtin.stat:
        path: /swapfile
      register: swap_stat

    - name: Allocate 2GB for the swap file
      ansible.builtin.command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile

    - name: Restrict permissions to root
      ansible.builtin.file:
        path: /swapfile
        mode: '0600'
      when: not swap_stat.stat.exists

    - name: Format the file as swap space
      ansible.builtin.command: mkswap /swapfile
      changed_when: true
      when: not swap_stat.stat.exists

    - name: Enable the swap memory
      ansible.builtin.command: swapon /swapfile
      changed_when: true
      when: not swap_stat.stat.exists

    - name: Make the swap configuration persistent across reboots
      ansible.posix.mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        passno: 0
        dump: 0
        state: present

    # docker
    - name: Update apt cache and install dependencies
      ansible.builtin.apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: true

    - name: Add Docker GPG apt Key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present

    - name: Install Docker Engine and Docker Compose plugin
      ansible.builtin.apt:
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled on boot
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # SSL/TLS certification
    - name: Install Certbot
      ansible.builtin.apt:
        name: certbot
        state: present

    - name: Check if SSL certificate already exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/cloud1ty.duckdns.org/fullchain.pem
      register: ssl_cert

    - name: Stop Nginx container temporarily to free port 80 for Certbot
      ansible.builtin.command: docker stop cloud1_nginx
      failed_when: false
      changed_when: false
      when: not ssl_cert.stat.exists

    - name: Generate SSL certificate via Certbot standalone
      ansible.builtin.command: >
        certbot certonly --standalone
        -d cloud1ty.duckdns.org
        --non-interactive
        --agree-tos
        -m admin@cloud1ty.duckdns.org
      args:
        creates: /etc/letsencrypt/live/cloud1ty.duckdns.org/fullchain.pem

    # file tranfers
    - name: Create project directory on remote server
      ansible.builtin.file:
        path: /opt/cloud1
        state: directory
        mode: '0755'

    - name: Copy configuration files to remote server
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /opt/cloud1/
        mode: '0644'
      loop:
        - docker-compose.yml
        - .env
        - nginx.conf

    - name: Start Docker Compose services
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/cloud1
      changed_when: false

    # config wordpress
    - name: Wait for containers to initialize
      ansible.builtin.pause:
        seconds: 20

    - name: Install and configure WordPress via WP-CLI
      ansible.builtin.command: >
        docker compose exec -T wordpress sh -c '
        curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar &&
        chmod +x wp-cli.phar && mv wp-cli.phar /usr/local/bin/wp &&
        wp core is-installed --allow-root || wp core install --url=$WP_URL --title=$WP_TITLE
        --admin_user=$WP_ADMIN_USER --admin_password=$WP_ADMIN_PASSWORD
        --admin_email=$WP_ADMIN_EMAIL --allow-root --path=/var/www/html &&
        wp user get $WP_USER_LOGIN --allow-root || wp user create $WP_USER_LOGIN $WP_USER_EMAIL
        --user_pass=$WP_USER_PASSWORD --role=author --allow-root --path=/var/www/html'
      args:
        chdir: /opt/cloud1
      changed_when: false
